
title: "MARC 2026 — MetaSejong AI Robot Challenge"
description: "MetaSejong AI Robot Challenge 2026 — Vision-Language-Action robot competition, in conjunction with IEEE MetaCom 2026."
url: "https://marc-challenge.github.io"
baseurl: ""
lang_default: en

season_state: announced
edition: "2026"
competition_active: false

event:
  short_name: "MARC 2026"
  full_name: "MetaSejong AI Robot Challenge 2026"
  edition_no: "2nd"
  series: "MetaSejong AI Robot Challenge"
  affiliation: "IEEE MetaCom 2026"
  venue: "Xi'an, China"
  finals_date: "2026-11-09"
  contact_email: "marc2026@iotcoss.ac.kr"

links:
  metacom: "https://ieee-metacom.org/"
  dev_guide: "https://marc-challenge.readthedocs.io/"
  starter_kit: "https://github.com/marc-challenge/marc-starter-kit"
  register_form: "https://docs.google.com/forms/d/e/1FAIpQLSfWKXByNoAe_CGjqMS1x6_ptVeqsqnQ9HYojFzBNezCyy93nA/viewform"
  sdk_version: "2026.1.0"
  collaborator_account: "marc-challenge-office"

collections:
  ko:
    output: true
    permalink: /ko/:path/
  en:
    output: true
    permalink: /en/:path/

defaults:
  - scope: { path: "_ko", type: "ko" }
    values: { layout: "default", lang: "ko" }
  - scope: { path: "_en", type: "en" }
    values: { layout: "default", lang: "en" }

markdown: kramdown
sass:
  style: compressed

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - _config.draft.yml
  - vendor
  - .github
